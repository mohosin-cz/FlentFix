var rate=(it.matNum>0&&it.costN>0)?'<div class="sec"><span class="ey">Rate card \u00B7 <span style="color:var(--faint)">internal</span></span><div class="crow"><span class="lbl">Your cost</span><span class="val">'+inr(it.costN)+'</span></div><div class="crow"><span class="lbl">Charge</span><span class="val">'+inr(it.matNum)+'</span></div><div class="crow" style="border:none"><span class="lbl">Margin</span><span class="val margin">'+inr(it.matNum-it.costN)+' ('+Math.round((it.matNum-it.costN)/it.matNum*100)+'%)</span></div></div>':'';
var avail=it.avail?'<div class="sec tg"><span class="ey">Availability</span><span class="avl '+it.avail+'">'+(it.avail==='ok'?'In stock':'To procure')+'</span></div>':'';
var warr='<div class="sec tg"><span class="ey">Warranty</span><span class="val" style="font-family:var(--mono);color:'+(it.warr?'var(--ink2)':'var(--faint)')+'">'+(it.warr||'\u2014')+'</span></div>';
var notes=it.notes?'<div class="sec"><span class="ey">Inspector notes</span><div class="fld" style="color:var(--muted)">'+it.notes+'</div></div>':'';
var disp=it.disputed?'<div class="sec"><span class="ey">Dispute</span><div class="disp"><div class="who">Landlord dispute \u00B7 open</div><div class="msg">\u201CIs a door stopper really necessary here?\u201D</div><div class="reply">Reply to the landlord\u2026</div></div></div>':'';
var gal=it.p?'<div class="gal"><div class="g"></div>'+(it.p>1?'<div class="g"></div>':'')+(it.v?'<div class="g"></div>':'')+'<div class="gadd">+ add</div></div>':'<div class="gal"><div class="gadd">+ add</div></div>';
var wd=it.wd?'<div class="sec"><span class="ey">What we\u2019ll do</span><div class="fld">'+it.wd+'</div></div>':'';
var cond='<div class="sec"><span class="ey">Condition</span><div style="display:flex;align-items:center;gap:10px"><span class="sc '+scls(it.score)+'" style="padding:2px 8px;display:inline-block">'+it.score+'/10</span><span style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)">'+rrTxt(it.score)+'</span></div><div class="cbar"><i style="width:'+(it.score*10)+'%;background:'+barCol(it.score)+'"></i></div></div>';
return '<div class="dh"><div><div class="ey">'+it.arFull+'</div><div class="it">'+it.it+'</div><div class="cnt">Item '+(idx+1)+' of '+items.length+'</div></div><div class="dnav"><div class="ic" data-nav="-1">\u2039</div><div class="ic" data-nav="1">\u203A</div><div class="ic dclose">\u00D7</div></div></div><div class="db"><div class="sec"><span class="ey">Media</span>'+gal+'</div>'+cond+'<div class="sec"><span class="ey">Finding</span><div class="fld">'+it.find+'</div></div>'+wd+notes+'<div class="sec"><span class="ey">Cost</span>'+cb+'</div>'+rate+avail+warr+'<div class="sec"><span class="ey">Type \u00B7 <span style="color:var(--faint)">P / A / N</span></span>'+segHtml(it)+'</div><div class="sec tg"><span class="ey">Exclude \u00B7 <span style="color:var(--faint)">E</span></span><div class="sw'+(it.excluded?' on':'')+'"></div></div><div class="sec"><span class="ey">History</span><div class="hist">'+it.hist+'</div></div>'+disp+'</div>';}
var dash=document.getElementById('dash'),board=document.getElementById('board'),dwr=document.getElementById('dwr');
var sel=0,open=true;
function highlight(){var rs=document.querySelectorAll('.row');for(var x=0;x<rs.length;x++){rs[x].classList.toggle('active',open&&(+rs[x].dataset.idx)===sel);}}
function subtotal(g){var s=0;for(var i=g.from;i<=g.to;i++){if(!items[i].excluded)s+=items[i].priceNum;}return s;}
function renderBoard(){var h='';groups.forEach(function(g){h+='<section class="grp '+g.cls+'"><div class="ghead"><span class="gt">\u25BE '+g.name+'</span><span class="gr"><b>'+(g.to-g.from+1)+' items</b> \u00B7 '+inr(subtotal(g))+'</span></div><div class="colhead"><span></span><span>Cond</span><span>Area \u00B7 Item</span><span>Finding</span><span>Material</span><span>Labour</span><span>Qty</span><span>Total</span><span>Type</span><span>Media</span><span></span></div>';for(var i=g.from;i<=g.to;i++){h+=rowHtml(items[i],i);}if(g.cls==='clean'){h+='<div class="addrow">+ Add item</div>';}h+='</section>';});board.innerHTML=h;highlight();}
function recompute(){var firm=0,mat=0,lab=0,p=0,a=0,n=0,nd=0,rep=0,rpr=0,ok=0,dp=0,ng=0,ss=0;items.forEach(function(it){ss+=it.score;if(it.score<=3)rep++;else if(it.score<=6)rpr++;else ok++;if(it.disputed)dp++;if(!it.p&&!it.excluded)ng++;if(it.excluded)return;if(it.type==='actual')a++;else if(it.type==='none')n++;else{if(it.priceNum>0){p++;firm+=it.priceNum;mat+=it.matNum*it.qtyN;lab+=it.labNum*it.qtyN;}else nd++;}});
var cond=(ss/items.length).toFixed(1);var matpct=mat+lab?Math.round(mat/(mat+lab)*100):0;var tot=items.length;var ready=p+a+n;var rpct=Math.round(ready/tot*100);
var stack=function(c,col){return c?'<i style="width:'+(c/tot*100)+'%;background:'+col+'"></i>':'';};
dash.innerHTML=
'<div class="card"><div class="ct">Totals</div><div class="big">'+inr(firm)+'</div><div class="splitbar"><i style="width:'+matpct+'%;background:var(--blue)"></i><i style="width:'+(100-matpct)+'%;background:var(--gold)"></i></div><div class="mlrow"><span class="lbl"><span class="dot" style="background:var(--blue)"></span>Materials</span><span>'+inr(mat)+'</span></div><div class="mlrow"><span class="lbl"><span class="dot" style="background:var(--gold)"></span>Labour</span><span>'+inr(lab)+'</span></div></div>'+
'<div class="card"><div class="ct">Overall condition</div><div class="condrow"><span class="condnum" style="color:'+barCol(cond)+'">'+cond+'</span><span class="dist">/ 10</span></div><div class="meter"><i style="width:'+(cond*10)+'%;background:'+barCol(cond)+'"></i></div><div class="dist">'+rep+' replace \u00B7 '+rpr+' repair \u00B7 '+ok+' ok</div></div>'+
'<div class="card"><div class="ct">Pricing coverage</div><div class="stackbar">'+stack(p,'var(--gold)')+stack(a,'var(--teal)')+stack(n,'#3a3f4b')+stack(nd,'var(--amber)')+'</div><div class="legend"><span><span class="dot" style="background:var(--gold)"></span>Priced <b>'+p+'</b></span><span><span class="dot" style="background:var(--teal)"></span>Actuals <b>'+a+'</b></span><span><span class="dot" style="background:#3a3f4b"></span>None <b>'+n+'</b></span><span><span class="dot" style="background:var(--amber)"></span>Needs <b>'+nd+'</b></span></div></div>'+
'<div class="card"><div class="ct">Send readiness</div><div class="condrow"><span class="condnum" style="color:var(--ink);font-size:18px">'+rpct+'%</span><span class="dist">'+ready+'/'+tot+' priced</span></div><div class="meter"><i style="width:'+rpct+'%;background:var(--good)"></i></div><div class="flagrow"><span class="clay">\u25CF Disputed '+dp+'</span><span>\u25A4 No photo '+ng+'</span></div></div>';}
function renderP(){if(open)dwr.innerHTML=drawer(sel);}
function apply(){document.body.classList.toggle('dopen',open);dwr.classList.toggle('show',open);if(open)renderP();highlight();}
function openItem(i){sel=Math.max(0,Math.min(items.length-1,i));open=true;apply();var r=document.querySelector('.row[data-idx="'+sel+'"]');if(r)r.scrollIntoView({block:'nearest'});}
function toggle(i){if(open&&sel===i){open=false;apply();}else{openItem(i);}}
function setType(i,t){items[i].type=t;renderBoard();recompute();renderP();}
document.addEventListener('click',function(e){var sg=e.target.closest('.seg b');if(sg){var row=e.target.closest('.row');var i=row?(+row.dataset.idx):sel;setType(i,sg.dataset.t);e.stopPropagation();return;}var nav=e.target.closest('[data-nav]');if(nav){openItem(sel+(+nav.dataset.nav));return;}if(e.target.closest('.dclose')){open=false;apply();return;}if(e.target.closest('.sw')){items[sel].excluded=!items[sel].excluded;renderBoard();recompute();renderP();return;}var r=e.target.closest('.row');if(r){toggle(+r.dataset.idx);}});
document.addEventListener('keydown',function(e){var k=e.key;if(k==='ArrowDown'||k==='j'){openItem(sel+1);e.preventDefault();}else if(k==='ArrowUp'||k==='k'){openItem(sel-1);e.preventDefault();}else if(k==='Home'){openItem(0);e.preventDefault();}else if(k==='End'){openItem(items.length-1);e.preventDefault();}else if(k==='Escape'){open=false;apply();}else if(k==='Enter'){openItem(sel);}else if(k==='p'||k==='P'){setType(sel,'priced');}else if(k==='a'||k==='A'){setType(sel,'actual');}else if(k==='n'||k==='N'){setType(sel,'none');}else if(k==='e'||k==='E'){items[sel].excluded=!items[sel].excluded;renderBoard();recompute();renderP();}});
renderBoard();recompute();apply();
</script>
</body></html>
